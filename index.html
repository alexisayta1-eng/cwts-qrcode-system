<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWTS Attendance System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        #qr-display {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin: 1.5rem auto;
            width: 230px;
            height: 230px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>
    <div class="glass-card" style="margin-top: 10vh;">
        <h1>CWTS SYSTEM</h1>
        <p style="text-align: center; margin-bottom: 2rem; opacity: 0.8;">Secure QR Attendance Management</p>

        <button onclick="openStudentModal()" class="btn" style="background: var(--accent); color: white;">STUDENT</button>
        <a href="officer.html" class="btn">SCANNER</a>
        <a href="admin.html" class="btn btn-secondary">ADMIN</a>

        <div style="margin-top: 2rem; font-size: 0.75rem; text-align: center; opacity: 0.5;">
            Powered by Supabase & QR Technology
        </div>
    </div>

    <!-- Student Portal Modal -->
    <div id="student-modal" class="modal-overlay">
        <div class="glass-card modal-content" style="margin-top: 0; position: relative;">
            <button onclick="closeStudentModal()"
                style="position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>

            <div id="id-input-view">
                <h2 style="margin-bottom: 1rem;">STUDENT PORTAL</h2>
                <p style="font-size: 0.9rem; opacity: 0.7; margin-bottom: 1.5rem;">Enter your Student ID to view your QR</p>
                <div class="input-group">
                    <input type="text" id="student-id" placeholder="Student ID (Serial No.)"
                        style="text-align: center; font-size: 1.1rem; letter-spacing: 2px;">
                </div>
                <button class="btn" onclick="fetchStudentQR()">GENERATE QR</button>
                <p id="error-msg" style="color: #f87171; font-size: 0.8rem; margin-top: 10px; display: none;">Student Not Found</p>
            </div>

            <div id="qr-view" style="display: none;">
                <h2 id="student-name-display" style="margin-bottom: 0.5rem; color: var(--accent);"></h2>
                <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 1rem;">YOUR ATTENDANCE QR CODE</p>
                <div id="qr-display"></div>
                <button class="btn btn-secondary" onclick="resetStudentModal()" style="margin-top: 1rem;">BACK</button>
            </div>
        </div>
    </div>
    <script>
        const modal = document.getElementById('student-modal');
        const idView = document.getElementById('id-input-view');
        const qrView = document.getElementById('qr-view');
        const errorMsg = document.getElementById('error-msg');
        let qrGenerator = null;

        function openStudentModal() {
            modal.style.display = 'flex';
            document.getElementById('student-id').focus();
        }

        function closeStudentModal() {
            modal.style.display = 'none';
            resetStudentModal();
        }

        function resetStudentModal() {
            idView.style.display = 'block';
            qrView.style.display = 'none';
            errorMsg.style.display = 'none';
            document.getElementById('student-id').value = '';
            document.getElementById('qr-display').innerHTML = '';
        }

        async function fetchStudentQR() {
            const id = document.getElementById('student-id').value.trim();
            if (!id) return;

            errorMsg.style.display = 'none';
            try {
                // Supabase Fetch
                const { data, error } = await window.supabase
                    .from('cadets')
                    .select('*')
                    .eq('serial', id)
                    .single();

                if (error || !data) {
                    errorMsg.style.display = 'block';
                    return;
                }
                showQR(data);
            } catch (e) {
                console.error(e);
                errorMsg.style.display = 'block';
            }
        }

        function showQR(student) {
            idView.style.display = 'none';
            qrView.style.display = 'block';
            document.getElementById('student-name-display').textContent = student.name.toUpperCase();

            const qrDisplay = document.getElementById('qr-display');
            qrDisplay.innerHTML = '';

            // Format used by the scanner: JSON object
            const qrData = JSON.stringify({
                name: student.name,
                serial: student.serial,
                department: student.department,
                year_level: student.year_level,
                section: student.section,
                gender: student.gender
            });

            new QRCode(qrDisplay, {
                text: qrData,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker failed', err));
            });
        }
    </script>
</body>

</html>
