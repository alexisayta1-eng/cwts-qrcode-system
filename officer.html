<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Officer - Scan Attendance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a2a6c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Mobile-First Adjustments for Logs */
        @media screen and (max-width: 600px) {
            #logs-overlay {
                align-items: flex-end !important; /* Bottom sheet align */
            }
            #logs-modal-container, #absent-modal-container {
                width: 100% !important;
                max-width: none !important;
                height: 70vh !important;
                border-radius: 32px 32px 0 0 !important;
                padding: 1.2rem !important;
                animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            @keyframes slideUp {
                from { transform: translateY(100%); }
                to { transform: translateY(0); }
            }
            .pull-handle {
                width: 40px;
                height: 5px;
                background: rgba(255, 255, 255, 0.2);
                border-radius: 10px;
                margin: 0 auto 15px auto;
                display: block !important;
            }
            /* Dashboard Scaling */
            .glass-card#scanner-card {
                padding: 1.5rem !important;
                height: calc(100vh - 60px) !important;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .scanner-container {
                max-height: 350px !important;
                margin: 1rem 0 !important;
            }
            h1 { font-size: 1.4rem !important; letter-spacing: 1px !important; }
            .nav-bar span { font-size: 0.8rem; }
            
            /* Status Pills */
            .status-pill {
                padding: 4px 12px;
                border-radius: 20px;
                font-weight: 700;
                font-size: 0.7rem;
                text-transform: uppercase;
            }
            
            /* Table to Cards */
            #logs-table thead { display: none; }
            #logs-table, #logs-table tbody, #logs-table tr, #logs-table td {
                display: block; width: 100% !important; min-width: 0 !important;
            }
            #logs-table tr {
                background: rgba(255, 255, 255, 0.03);
                margin-bottom: 12px;
                padding: 16px;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            #logs-table td {
                padding: 6px 0 !important; border: none !important;
                display: flex; justify-content: space-between; align-items: center;
            }
            #logs-table td::before {
                content: attr(data-label);
                font-weight: 500; font-size: 0.65rem; opacity: 0.4;
                text-transform: uppercase; letter-spacing: 0.5px;
            }
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(15px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: left;
        }

        .login-box h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
    </style>
</head>

<body style="overflow: hidden;">
    <!-- Login Overlay -->
    <div id="login-overlay" style="display: flex;">
        <div class="glass-card login-box" style="position: relative;">
            <a href="index.html" class="back-btn" style="position: absolute; left: 20px; top: 20px; text-decoration: none; color: white;">←</a>
            <h1>SCANNER LOGIN</h1>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="officer-user" placeholder="Enter Username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="officer-pass" placeholder="Enter Password">
            </div>
            <button class="btn" onclick="attemptLogin()">ACCESS PANEL</button>
            <p id="login-err" style="color: #f87171; font-size: 0.8rem; margin-top: 10px; display: none;">Invalid Credentials</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="officer-content" style="display: none; height: 100vh; flex-direction: column;">
        <div class="nav-bar">
            <a href="index.html" style="color: white; text-decoration: none; font-size: 1.2rem;">✕</a>
            <span style="font-weight: 700; letter-spacing: 1px;">SCANNER</span>
            <div id="status-badge" class="badge">READY</div>
        </div>

        <div class="glass-card" id="scanner-card"
            style="flex-grow: 1; border-radius: 0; margin-top: 0; width: 100%; max-width: none; border: none;">
            <div id="setup-info"
                style="display: none; padding: 1rem; background: rgba(239, 68, 68, 0.2); border-radius: 12px; margin-bottom: 1rem; border: 1px solid #ef4444; color: white;">
                <p id="setup-msg" style="font-size: 0.9rem; text-align: center; font-weight: 600;"></p>
            </div>

            <div id="officer-welcome"
                style="text-align: center; margin-bottom: 0.5rem; font-size: 0.8rem; opacity: 0.7;">
            </div>

            <!-- Scan Counter -->
            <div style="text-align: center; margin-bottom: 1rem; font-size: 0.9rem; font-weight: 600; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; cursor: pointer; transition: background 0.3s;"
                onclick="showLogsModal()" onmouseover="this.style.background='rgba(0,0,0,0.4)'"
                onmouseout="this.style.background='rgba(0,0,0,0.2)'">
                STUDENTS SCANNED: <span id="scan-count" style="color: #fdbb2d;">0</span>
                <div style="font-size: 0.6rem; opacity: 0.5; margin-top: 2px;">CLICK TO VIEW LOGS</div>
            </div>            <!-- Scanner Area -->
            <div class="scanner-container" style="position: relative; flex-grow: 1; border-radius: 20px; overflow: hidden; border: 4px solid var(--accent); background: rgba(0,0,0,0.4); margin-top: 10px;">
                <div id="reader" style="width: 100%;"></div>
                <div id="scan-frame" class="scanner-frame" style="display: none;">
                    <div class="scanner-line"></div>
                </div>
            </div>


            <div id="result-message"
                style="text-align: center; margin-top: 1rem; font-weight: 700; font-size: 1.2rem; min-height: 1.5em; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">
            </div>

            <div id="camera-controls" style="margin-top: auto; padding-bottom: 2rem;">
                <button class="btn" id="start-btn" onclick="startScanner('environment')">START SCANNING</button>
                <div id="alt-controls" style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn btn-secondary" style="flex: 1; margin: 0;" onclick="startScanner('user')">FRONT CAM</button>
                    <button class="btn btn-secondary" style="flex: 1; margin: 0;" onclick="startScanner('environment')">REAR CAM</button>
                </div>
            </div>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        const overlay = document.getElementById('login-overlay');
        const content = document.getElementById('officer-content');

        // Check for existing session
        if (sessionStorage.getItem('officerAuthed') === 'true') {
            overlay.style.display = 'none';
            content.style.display = 'flex';
        }

        function attemptLogin() {
            const user = document.getElementById('officer-user').value;
            const pass = document.getElementById('officer-pass').value;
            if (user === 'admin' && pass === 'admin123') {
                sessionStorage.setItem('officerAuthed', 'true');
                overlay.style.display = 'none';
                content.style.display = 'flex';
                // Trigger scanner if needed, or it'll start when shown
            } else {
                document.getElementById('login-err').style.display = 'block';
                setTimeout(() => document.getElementById('login-err').style.display = 'none', 3000);
            }
        }
        let officerName = "Duty Officer";

        document.getElementById('officer-welcome').textContent = `SYSTEM STATUS: SCANNER READY`;

        // Authentication logic removed per user request for direct access.

        const html5QrCode = new Html5Qrcode("reader");
        const statusBadge = document.getElementById('status-badge');
        const resultMsg = document.getElementById('result-message');
        const setupInfo = document.getElementById('setup-info');
        const setupMsg = document.getElementById('setup-msg');
        const scanFrame = document.getElementById('scan-frame');
        const startBtn = document.getElementById('start-btn');
        const scanCountEl = document.getElementById('scan-count');
        let totalScansSession = 0;

        function checkEnvironment() {
            if (!window.isSecureContext && location.protocol !== 'file:') {
                showError("HTTPS REQUIRED for Camera Access.");
                return false;
            }
            return true;
        }

        function showError(msg) { setupInfo.style.display = 'block'; setupMsg.textContent = msg; }

        function onScanSuccess(decodedText) {
            if (window.navigator.vibrate) window.navigator.vibrate(100);
            html5QrCode.stop().then(() => {
                scanFrame.style.display = 'none';
                statusBadge.textContent = "SAVING...";
                statusBadge.className = "badge badge-pending";
                recordAttendance(decodedText);
            }).catch(err => console.error(err));
        }

        function showToast(title, message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;

            const icon = type === 'success' ? '✅' : '❌';

            toast.innerHTML = `
                <div class="toast-icon">${icon}</div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-msg">${message}</div>
                </div>
            `;

            container.appendChild(toast);

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 100);

            // Remove after 4s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        async function showAbsenteesInScanner() {
            const overlay = document.getElementById('scanner-absent-overlay');
            const list = document.getElementById('scanner-absent-list');
            const badge = document.getElementById('absent-count-badge');
            
            overlay.style.display = 'flex';
            list.innerHTML = "<div style='text-align:center; padding: 20px; opacity: 0.5;'>Loading absentee list...</div>";
            badge.textContent = "Checking records...";

            try {
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

                // 1. Get all students via Supabase
                const { data: cadetsData, error: cadetsError } = await window.supabase.from('cadets').select('*');
                if (cadetsError) throw cadetsError;
                let allCadets = cadetsData || [];

                // 2. Get today's attendance via Supabase
                const { data: presentData, error: presentError } = await window.supabase
                    .from('attendance')
                    .select('serial')
                    .eq('date', dateStr);
                if (presentError) throw presentError;
                
                const presentSerialSet = new Set((presentData || []).map(r => r.serial));

                // 3. Filter absentees
                const absentees = allCadets.filter(c => !presentSerialSet.has(c.serial));

                // 4. Render
                badge.textContent = `Total Absentees: ${absentees.length}`;
                if (absentees.length === 0) {
                    list.innerHTML = "<div style='text-align:center; padding: 40px; opacity: 0.5;'>Everyone is present! 🥳</div>";
                } else {
                    list.innerHTML = absentees.map(a => `
                        <div class="glass-card" style="padding: 12px; border: 1px solid rgba(248, 113, 113, 0.2); background: rgba(248, 113, 113, 0.05);">
                            <div style="font-weight: 700; color: #fff;">${a.name}</div>
                            <div style="font-size: 0.65rem; opacity: 0.6; margin-top: 4px;">${a.department} | ${a.year_level} - ${a.section}</div>
                            <div style="font-size: 0.65rem; opacity: 0.4; margin-top: 2px;">ID: ${a.serial}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error(e);
                list.innerHTML = "<div style='text-align:center; color: #f87171;'>Error loading absentees.</div>";
            }
        }
        async function recordAttendance(studentData) {
            try {
                let student = JSON.parse(studentData);
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const isOffline = !navigator.onLine;

                // Send to Supabase
                const { error: insertError } = await window.supabase.from('attendance').insert([{
                    student_name: student.name,
                    serial: student.serial || student.id,
                    department: student.department || student.unit || student.course || "N/A",
                    year_level: student.year_level || "",
                    section: student.section || "",
                    scan_time: timeStr,
                    date: dateStr,
                    type: "PRESENT",
                    scanned_by: officerName
                }]);

                if (insertError) throw insertError;

                // Increment Scan Counter
                totalScansSession++;
                scanCountEl.textContent = totalScansSession;

                // Show Confirmation Overlay
                document.getElementById('conf-cadet-name').textContent = student.name;
                document.getElementById('conf-cadet-unit').textContent = student.course || student.unit || "No Course";
                document.getElementById('conf-status-text').textContent = "ATTENDANCE SUCCESSFUL";
                document.getElementById('confirmation-overlay').style.display = 'flex';

                resultMsg.textContent = `✅ RECORDED: ${student.name}`;
                if (isOffline) {
                    resultMsg.textContent += " (Offline)";
                    resultMsg.style.color = "#60a5fa";
                    showToast("RECORDED", `${student.name} (Offline)`, 'success');
                }
                else {
                    resultMsg.style.color = "#4ade80";
                    showToast("SUCCESSFUL", student.name, 'success');
                }

                statusBadge.textContent = "SUCCESS";
                statusBadge.className = "badge badge-success";

                // Refresh Logs immediately after success
                loadOfficerLogs();

                setTimeout(() => {
                    document.getElementById('confirmation-overlay').style.display = 'none';
                    startScanner('environment');
                    resultMsg.textContent = "";
                }, 2500);

            } catch (error) {
                console.error(error);
                resultMsg.textContent = "❌ Error Recording";
                resultMsg.style.color = "#f87171";
                showToast("SCAN ERROR", "Failed to reach server", "error");

                // Reset Badge on Error
                statusBadge.textContent = "ERROR";
                statusBadge.className = "badge badge-warning";

                setTimeout(() => {
                    statusBadge.textContent = "READY";
                    statusBadge.className = "badge badge-success";
                    startScanner('environment');
                }, 2500);
            }
        }

        window.addEventListener('online', () => { statusBadge.textContent = "ONLINE"; statusBadge.style.background = "#22c55e"; });
        window.addEventListener('offline', () => { statusBadge.textContent = "OFFLINE"; statusBadge.style.background = "#64748b"; });

        async function startScanner(mode = 'environment') {
            setupInfo.style.display = 'none';
            startBtn.style.display = 'none';
            try {
                await html5QrCode.start({ facingMode: mode }, { fps: 20, qrbox: (width, height) => { return { width: width * 0.8, height: width * 0.8 } } }, onScanSuccess);
                scanFrame.style.display = 'block';
                statusBadge.textContent = "ACTIVE";
                statusBadge.className = "badge badge-success";
            } catch (err) {
                console.error(err);
                showError("Permission Denied");
                startBtn.style.display = 'block';
            }
        }

        // --- Scan Logs Modal Logic ---
        function showLogsModal() {
            document.getElementById('logs-overlay').style.display = 'flex';
            loadOfficerLogs();
        }

        function closeLogsModal() {
            document.getElementById('logs-overlay').style.display = 'none';
        }

        async function loadOfficerLogs() {
            const list = document.getElementById('officer-logs-list');
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            try {
                const { data, error } = await window.supabase
                    .from('attendance')
                    .select('*')
                    .eq('date', dateStr);
                
                if (error) throw error;

                let records = (data || []);
                // Sort by ID desc
                records.sort((a, b) => (b.id - a.id));
                
                list.innerHTML = "";
                records.forEach(d => {
                    const displayTime = d.scan_time || "...";
                    list.innerHTML += `<tr>
                        <td data-label="Date" style="padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.7rem; opacity: 0.7;">${d.date}</td>
                        <td data-label="Name" style="padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600;">${d.student_name}</td>
                        <td data-label="Dept" style="padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--accent); font-weight: 600;">${d.department || '-'}</td>
                        <td data-label="Yr & Sec" style="padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); opacity: 0.8;">${d.year_level} - ${d.section}</td>
                        <td data-label="Time" style="padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); color:#4ade80; font-weight:bold;">${displayTime}</td>
                    </tr>`;
                });
                if (records.length === 0) {
                    list.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 20px; opacity: 0.5;'>No logs for today.</td></tr>";
                }
            } catch (error) {
                console.error("Officer logs fetch failed: ", error);
                list.innerHTML = `<tr><td colspan='6' style='text-align:center; padding: 20px; color: #f87171;'>Error loading logs: ${error.message}</td></tr>`;
            }
        }

        window.addEventListener('load', () => {
            checkEnvironment();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

            // Check for existing session
            if (sessionStorage.getItem('officerAuthed') === 'true') {
                officerName = sessionStorage.getItem('officerName') || "Duty Officer";
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('officer-content').style.display = 'flex';
                document.getElementById('officer-welcome').textContent = `OFFICER IN CHARGE: ${officerName}`;
                
                // --- REAL-TIME LISTENERS (Supabase Channels) ---
                window.supabase.channel('public:attendance')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'attendance' }, payload => {
                        console.log("Real-time: Officer logs updated");
                        loadOfficerLogs();
                    })
                    .subscribe();

                loadOfficerLogs(); // Initial load
            }
        });
    </script>
    <div id="toast-container"></div>

    <!-- Confirmation Overlay -->
    <div id="confirmation-overlay">
        <div class="conf-card">
            <div id="conf-status-text" class="conf-status">TIME IN SUCCESS</div>
            <div class="conf-icon">🎖️</div>
            <div id="conf-cadet-name" class="conf-name">STUDENT NAME</div>
            <div id="conf-cadet-unit" class="conf-unit">COURSE NAME</div>
            <div style="font-size: 0.8rem; opacity: 0.5;">AUTOCLOSE IN 2.5s</div>
        </div>
    </div>

    <!-- Logs Modal Overlay -->
    <div id="logs-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
        <div class="glass-card" id="logs-modal-container"
            style="width: 95%; max-width: 800px; height: 85vh; padding: 1.5rem; display: flex; flex-direction: column; position: relative;">
            <div class="pull-handle" style="display: none;"></div>
            <button onclick="closeLogsModal()"
                style="position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1rem;">✕</button>
            <div id="logs-header-actions" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <h2 style="margin: 0; font-size: 1.1rem; color: #fdbb2d; text-align: left;">YOUR SCANNED LOGS</h2>
                <button onclick="showAbsenteesInScanner()" style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #f87171; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                    <span>⚠️</span> ABSENTEES
                </button>
            </div>
            <div style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 15px; text-align: left;">Records scanned during this session.</div>

            <div
                style="overflow-y: auto; flex-grow: 1; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); width: 100%;">
                <table id="logs-table" style="width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: left;">
                    <thead style="position: sticky; top: 0; background: #1e293b; z-index: 1;">
                        <tr>
                            <th style="padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1);">Date</th>
                            <th style="padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1);">Name</th>
                            <th style="padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1);">Department</th>
                            <th style="padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1);">Year & Sec</th>
                            <th style="padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #4ade80;">Time</th>
                        </tr>
                    </thead>
                    <tbody id="officer-logs-list" style="font-size: 0.85rem;">
                        <!-- Scan logs go here -->
                    </tbody>
                </table>
            </div>

            <button class="btn btn-secondary" onclick="closeLogsModal()"
                style="margin: 0; width: 100%; font-size: 0.9rem; padding: 12px;">CLOSE</button>
        </div>
    <!-- Absentee Modal Overlay -->
    <div id="scanner-absent-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
        <div class="glass-card" id="absent-modal-container"
            style="width: 95%; max-width: 500px; height: 70vh; padding: 1.5rem; display: flex; flex-direction: column; position: relative;">
            <div class="pull-handle" style="display: none;"></div>
            <button onclick="document.getElementById('scanner-absent-overlay').style.display='none'"
                style="position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 1rem;">✕</button>
            
            <h2 style="margin-top: 5px; margin-bottom: 5px; font-size: 1.1rem; color: #f87171; text-align: left;">MISSING STUDENTS</h2>
            <div id="absent-count-badge" style="font-size: 0.75rem; opacity: 0.7; margin-bottom: 15px; text-align: left;">Calculating absentees...</div>

            <div style="overflow-y: auto; flex-grow: 1; margin-bottom: 15px; width: 100%;">
                <div id="scanner-absent-list" style="display: flex; flex-direction: column; gap: 10px;">
                    <!-- Absentees inject here -->
                </div>
            </div>

            <button class="btn btn-secondary" onclick="document.getElementById('scanner-absent-overlay').style.display='none'"
                style="margin: 0; width: 100%; font-size: 0.9rem; padding: 12px;">BACK TO LOGS</button>
        </div>
    </div>
